id: ssti-jsp-el
info:
  name: SSTI JSP EL Injection
  author: AniipID
  severity: critical
  description: Detects JSP Expression Language injection
  tags: ssti,jsp,el,java
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name=${7*7}"
      - "{{BaseURL}}?name=${pageContext.request.contextPath}"
      - "{{BaseURL}}?name=${session.getAttribute('user')}"
    matchers:
      - type: word
        words:
          - "pageContext"
          - "session"
        condition: or
        name: "jsp-el-ssti"
