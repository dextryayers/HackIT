id: tech-php
info:
  name: PHP Technology Detection
  author: AniipID
  severity: info
  description: Detects PHP usage via headers and file extensions
  tags: tech,php
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/index.php"
      - "{{BaseURL}}/phpinfo.php"
    matchers:
      - type: regex
        regex:
          - "X-Powered-By:\\s*PHP"
          - "PHP/\\d+\\.\\d+\\.\\d+"
        condition: or
        part: header
        name: "php-detected"
---
id: tech-nginx
info:
  name: Nginx Technology Detection
  author: AniipID
  severity: info
  description: Detects Nginx web server
  tags: tech,nginx,server
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "Server: nginx"
          - "nginx/"
        part: header
        name: "nginx-detected"
---
