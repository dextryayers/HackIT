id: tech-cdn
info:
  name: CDN Technology Detection
  author: AniipID
  severity: info
  description: Detects CDN/proxy technologies
  tags: tech,cdn,proxy,cloudflare
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "Server: cloudflare"
          - "CF-RAY"
          - "X-Sucuri-ID"
          - "X-Cache"
          - "Via: 1.1 varnish"
          - "AkamaiGHost"
        part: header
        condition: or
        name: "cdn-detected"
---
id: tech-framework-cookies
info:
  name: Framework Detection via Cookies
  author: AniipID
  severity: info
  description: Detects frameworks via session cookie names
  tags: tech,framework,cookies
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "PHPSESSID"
          - "JSESSIONID"
          - "ASP.NET_SessionId"
          - "connect.sid"
          - "sessionid"
          - "laravel_session"
          - "ci_session"
          - ".AspNetCore."
        part: header
        condition: or
        name: "framework-cookie-detected"
