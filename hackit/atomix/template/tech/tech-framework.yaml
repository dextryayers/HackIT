id: tech-django
info:
  name: Django Detection
  author: AniipID
  severity: info
  description: Detects Django web framework
  tags: tech,django,python
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/admin"
    matchers:
      - type: word
        words:
          - "csrftoken"
          - "django-admin"
          - "Django"
          - "django.session"
        condition: or
        name: "django-detected"
---
id: tech-flask
info:
  name: Flask Detection
  author: AniipID
  severity: info
  description: Detects Flask web framework
  tags: tech,flask,python
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "Server: Werkzeug"
          - "flask"
          - "session="
        part: header
        condition: or
        name: "flask-detected"
