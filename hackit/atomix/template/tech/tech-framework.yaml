id: tech-wordpress
info:
  name: WordPress Detection
  author: AniipID
  severity: info
  description: Detects WordPress CMS with version fingerprinting
  tags: tech,wordpress,cms
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/wp-content"
      - "{{BaseURL}}/wp-includes"
      - "{{BaseURL}}/wp-json"
    matchers:
      - type: word
        words:
          - "/wp-content/"
          - "/wp-includes/"
          - "wp-json"
          - "WordPress"
          - "wordpress"
        condition: or
        name: "wordpress-detected"
---
id: tech-joomla
info:
  name: Joomla Detection
  author: AniipID
  severity: info
  description: Detects Joomla CMS
  tags: tech,joomla,cms
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "/media/jui/"
          - "/components/com_"
          - "/modules/mod_"
          - "Joomla!"
          - "joomla"
        condition: or
        name: "joomla-detected"
