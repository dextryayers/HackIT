id: tech-cloudflare
info:
  name: Cloudflare Detection
  author: AniipID
  severity: info
  description: Detects Cloudflare reverse proxy
  tags: tech,cloudflare,cdn
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "Server: cloudflare"
          - "__cfduid"
          - "__cf_bm"
          - "cf-ray"
          - "CF-RAY"
        condition: or
        name: "cloudflare-detected"
