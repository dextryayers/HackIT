id: tech-aspnet
info:
  name: ASP.NET Detection
  author: AniipID
  severity: info
  description: Detects ASP.NET framework
  tags: tech,aspnet,.net
requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "X-AspNet-Version"
          - "X-AspNetMvc-Version"
          - "ASP.NET_SessionId"
          - "__VIEWSTATE"
          - "__EVENTVALIDATION"
        condition: or
        name: "aspnet-detected"
